<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join The Community | The Green SPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3A6B5C',
                        dark: '#2D4F4F',
                        darker: '#1A3636',
                        light: '#4A8B74',
                        lighter: '#5BA88A',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @layer base {
            body { @apply font-sans text-gray-800 bg-gray-50; }
        }
        .input-focus {
            @apply focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/10 rounded-full blur-[100px]"></div>
    <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-lighter/10 rounded-full blur-[100px]"></div>

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 bg-white rounded-[3rem] shadow-2xl overflow-hidden">
        
        <!-- Left Side: Visual -->
        <div class="hidden lg:block relative overflow-hidden">
            <img src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874?q=80&w=2070&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover" alt="SPA">
            <div class="absolute inset-0 bg-darker/60 backdrop-blur-[2px]"></div>
            <div class="absolute inset-0 p-20 flex flex-col justify-end text-white">
                <div class="max-w-md">
                    <h2 class="text-6xl font-black mb-8 leading-none tracking-tighter italic text-lighter">Invest in <br>Yourself.</h2>
                    <p class="text-xl font-bold text-gray-300 leading-relaxed">Join thousands of others who have found their center at The Green SPA. Exclusive benefits await you.</p>
                </div>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="p-12 md:p-16 flex flex-col justify-center">
            <div class="mb-10 text-center lg:text-left">
                <a href="index.html" class="inline-flex items-center gap-3 mb-8 group">
                    <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white">
                        <i data-lucide="leaf"></i>
                    </div>
                    <span class="text-xl font-black text-darker tracking-tight">The Green SPA</span>
                </a>
                <h1 class="text-4xl font-black text-darker tracking-tighter mb-2">Create Account</h1>
                <p class="text-lg text-gray-400 font-bold">Start your journey to serenity today.</p>
            </div>

            <form action="dashboard.html" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-darker uppercase tracking-widest ml-1">Full Name</label>
                        <input type="text" placeholder="John Wick" class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-medium input-focus">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-darker uppercase tracking-widest ml-1">Phone</label>
                        <input type="tel" placeholder="+1 (555) 000" class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-medium input-focus">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-darker uppercase tracking-widest ml-1">Email Address</label>
                    <input type="email" placeholder="name@example.com" class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-medium input-focus">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-darker uppercase tracking-widest ml-1">Secret Key</label>
                        <input type="password" placeholder="••••••••" class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-medium input-focus">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-darker uppercase tracking-widest ml-1">Confirm Key</label>
                        <input type="password" placeholder="••••••••" class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-medium input-focus">
                    </div>
                </div>

                <button type="submit" class="w-full bg-primary text-white py-5 rounded-2xl font-black text-lg hover:bg-light transition-all shadow-xl shadow-primary/20 transform active:scale-[0.98] mt-4">
                    Register Now
                </button>
            </form>

            <div class="mt-10 text-center">
                <p class="text-gray-400 font-bold">
                    Already a member? <a href="login.html" class="text-primary font-black hover:underline ml-1">Login here</a>
                </p>
                <div class="mt-8 flex justify-center gap-4">
                    <a href="#" class="text-xs text-gray-400 hover:text-darker transition-colors font-bold uppercase tracking-widest">Privacy Policy</a>
                    <span class="text-gray-200">|</span>
                    <a href="#" class="text-xs text-gray-400 hover:text-darker transition-colors font-bold uppercase tracking-widest">Terms of Service</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
