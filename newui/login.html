<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The Green SPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3A6B5C',
                        dark: '#2D4F4F',
                        darker: '#1A3636',
                        light: '#4A8B74',
                        lighter: '#5BA88A',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @layer base {
            body { @apply font-sans text-gray-800 bg-gray-50; }
        }
        .auth-bg {
            background: linear-gradient(135deg, #1A3636 0%, #3A6B5C 100%);
        }
        .input-focus {
            @apply focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <!-- Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full auth-bg -z-10 opacity-10"></div>
    <div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/20 rounded-full blur-[100px]"></div>
    <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-lighter/20 rounded-full blur-[100px]"></div>

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 bg-white rounded-[3rem] shadow-[0_50px_100px_-20px_rgba(26,54,54,0.2)] overflow-hidden">
        
        <!-- Left Side: Form -->
        <div class="p-12 md:p-20 flex flex-col justify-center">
            <div class="mb-12">
                <a href="index.html" class="inline-flex items-center gap-3 mb-10 group">
                    <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-primary/20 group-hover:rotate-12 transition-transform">
                        <i data-lucide="leaf"></i>
                    </div>
                    <span class="text-2xl font-black text-darker tracking-tight">The Green <span class="text-primary italic">SPA</span></span>
                </a>
                <h1 class="text-5xl font-black text-darker tracking-tighter mb-4">Welcome Back</h1>
                <p class="text-xl text-gray-400 font-medium">Step back into your sanctuary of peace.</p>
            </div>

            <form action="dashboard.html" class="space-y-8">
                <div class="space-y-3">
                    <label class="text-sm font-black text-darker uppercase tracking-widest ml-1">Identity</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="text" placeholder="Email or Phone Number" class="w-full pl-16 pr-8 py-5 bg-gray-50 border border-gray-100 rounded-3xl text-lg font-medium input-focus">
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-sm font-black text-darker uppercase tracking-widest">Security</label>
                        <a href="#" class="text-primary font-bold hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" placeholder="••••••••" class="w-full pl-16 pr-8 py-5 bg-gray-50 border border-gray-100 rounded-3xl text-lg font-medium input-focus">
                    </div>
                </div>

                <div class="flex items-center gap-3 ml-1">
                    <label class="flex items-center gap-4 cursor-pointer group">
                        <input type="checkbox" class="w-6 h-6 rounded-xl accent-primary border-gray-200">
                        <span class="text-gray-500 font-bold group-hover:text-darker transition-colors">Keep me signed in</span>
                    </label>
                </div>

                <button type="submit" class="w-full bg-primary text-white py-6 rounded-3xl font-black text-xl hover:bg-light transition-all shadow-2xl shadow-primary/30 transform active:scale-[0.98]">
                    Enter Sanctuary
                </button>
            </form>

            <div class="mt-12 text-center">
                <div class="relative flex items-center justify-center mb-10">
                    <div class="absolute w-full h-px bg-gray-100"></div>
                    <span class="relative bg-white px-6 text-sm text-gray-400 font-black uppercase tracking-[0.2em]">Social Access</span>
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <button class="flex items-center justify-center gap-4 py-5 border-2 border-gray-50 rounded-3xl hover:bg-gray-50 transition-all font-black text-darker">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
                        Google
                    </button>
                    <button class="flex items-center justify-center gap-4 py-5 border-2 border-gray-50 rounded-3xl hover:bg-gray-50 transition-all font-black text-darker">
                        <i data-lucide="apple" class="w-6 h-6"></i>
                        Apple
                    </button>
                </div>

                <p class="mt-12 text-gray-400 font-bold">
                    New to the community? <a href="register.html" class="text-primary font-black hover:underline ml-1">Join Now</a>
                </p>
            </div>
        </div>

        <!-- Right Side: Visual -->
        <div class="hidden lg:block relative overflow-hidden">
            <img src="https://images.unsplash.com/photo-1600334089648-b0d9d3028eb2?q=80&w=2070&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover" alt="SPA">
            <div class="absolute inset-0 bg-primary/60 backdrop-blur-[2px]"></div>
            <div class="absolute inset-0 p-20 flex flex-col justify-end text-white">
                <div class="max-w-md">
                    <div class="flex gap-2 mb-6">
                        <i data-lucide="star" class="w-6 h-6 fill-lighter text-lighter"></i>
                        <i data-lucide="star" class="w-6 h-6 fill-lighter text-lighter"></i>
                        <i data-lucide="star" class="w-6 h-6 fill-lighter text-lighter"></i>
                        <i data-lucide="star" class="w-6 h-6 fill-lighter text-lighter"></i>
                        <i data-lucide="star" class="w-6 h-6 fill-lighter text-lighter"></i>
                    </div>
                    <h2 class="text-4xl font-black mb-6 leading-tight tracking-tighter">"The best decision I've made for my mental health this year."</h2>
                    <p class="text-xl font-bold text-lighter">— Marcus, Platinum Member</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
